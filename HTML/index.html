<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="shortcut icon" href="../Images/pms-favicon.png" type="image/x-icon">
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <title>Product Management System</title>
</head>

<body>

    <!-- 
        NavBar Section
        - sticky-top: keeps nav at top while scrolling
        - bg-white: standard white background
        - shadow-sm: subtle shadow for elevation
        - py-2: vertical padding (y-axis) level 2 
    -->
    <nav class="navbar sticky-top bg-white shadow-sm py-2">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <!-- Branding Area -->
            <div class="d-flex align-items-center gap-3">
                <a class="navbar-brand m-0" href="#">
                    <img src="../Images/pms-logo.png" alt="logo" width="40" height="40">
                </a>
                <div class="d-flex flex-column">
                    <span class="fw-bold fs-5 text-dark lh-1">Product Management</span>
                    <span class="text-muted fs-7">Chaos, Organized.</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Application Container -->
    <main class="mainContent">

        <!-- 
            Top Action Area: Contains the 'Add New Product' trigger 
            - pt-4: Padding top level 4
            - px-sm-5: Horizontal padding level 5 on small screens and up
        -->
        <div class="pt-4 px-4 px-sm-5 d-flex justify-content-end">
            <button type="button" class="add-btn d-flex align-items-center gap-2 border-0 fw-semibold" 
                    data-bs-toggle="modal" data-bs-target="#addOrEditProductModal">
                <img src="../Icons/add-icon.svg" alt="add" width="18" height="18" style="filter: brightness(0) invert(1);">
                Add New Product
            </button>
        </div>

        <!-- 
            Modal: Add or Update Product
            - fade: enables smooth fade-in animation
            - data-bs-backdrop="static": prevents closing by clicking outside
            - modal-dialog-centered: centers the modal vertically
        -->
        <div class="modal fade" id="addOrEditProductModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true"
            data-bs-backdrop="static" data-bs-keyboard="false">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content rounded-4 shadow-lg border-0">
                    <!-- Modal Header: Custom padding and border -->
                    <div class="modal-header d-flex justify-content-center border-bottom py-4">
                        <div class="d-flex align-items-center gap-2">
                            <img src="../Images/add-product.png" id="modalHeader" alt="icon" width="28" height="28">
                            <h2 class="modal-title fw-bold mb-0 fs-4" id="formModalLabel">Add New Product</h2>
                        </div>
                    </div>
                    <!-- Form Body -->
                    <div class="modal-body p-4">
                        <form id="productForm">
                            <div class="row g-3"> <!-- g-3: adds gutter spacing between columns -->
                                <div class="col-md-4">
                                    <div class="form-floating">
                                        <input type="number" class="form-control rounded-3" id="productId" placeholder="ID"
                                            onkeydown="validateNumberInput(event)" oninput="validateFormInput(); validateId()"
                                            required>
                                        <label for="productId">Product ID</label>
                                    </div>
                                </div>
                                <div class="col-md-8">
                                    <div class="form-floating">
                                        <input type="text" class="form-control rounded-3" id="productName" placeholder="Name"
                                            oninput="validateFormInput()" required>
                                        <label for="productName">Product Name</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating">
                                        <textarea class="form-control rounded-3" id="productDesc" style="height: 100px"
                                            placeholder="Desc" oninput="validateFormInput()" required></textarea>
                                        <label for="productDesc">Description</label>
                                    </div>
                                </div>
                                <!-- Price Input with Currency Symbol prefix -->
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text bg-light rounded-start-3">$</span>
                                        <div class="form-floating flex-grow-1">
                                            <input type="number" class="form-control rounded-end-3" id="productPrice" placeholder="Price"
                                                onkeydown="validateNumberInput(event)" oninput="validateFormInput()"
                                                required>
                                            <label for="productPrice">Price</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-floating">
                                        <select class="form-select rounded-3" id="productCategory" oninput="validateFormInput()"
                                            required>
                                            <option value="" disabled selected>Select Category</option>
                                            <option value="Electronics">Electronics</option>
                                            <option value="Stationery">Stationery</option>
                                            <option value="Footwear">Footwear</option>
                                            <option value="Fitness">Fitness</option>
                                        </select>
                                        <label for="productCategory">Category</label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-floating">
                                        <input type="number" class="form-control rounded-3" id="productStock" placeholder="Stock"
                                            onkeydown="validateNumberInput(event)" oninput="validateFormInput()" required>
                                        <label for="productStock">Stock</label>
                                    </div>
                                </div>
                            </div>
                            <!-- Form Actions -->
                            <div class="d-flex gap-2 justify-content-end mt-4">
                                <button type="button" class="btn btn-light px-4 rounded-3" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary-custom px-4 rounded-3 fw-bold" id="submitBtn"
                                    onclick="addProduct(event)" data-bs-dismiss="modal" disabled>Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Confirm Delete Modal: Simple warning centered on screen -->
        <div class="modal fade" id="deleteConfirmationModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4 shadow-lg border-0">
                    <div class="modal-body p-4">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="text-danger">
                                <!-- Warning Triangle Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
                                    class="bi bi-exclamation-triangle" viewBox="0 0 16 16">
                                    <path
                                        d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.146.146 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.163.163 0 0 1-.054.06.116.116 0 0 1-.066.017H1.146a.115.115 0 0 1-.066-.017.163.163 0 0 1-.054-.06.176.176 0 0 1 .002-.183L7.884 2.073a.147.147 0 0 1 .054-.057zm1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566z" />
                                    <path
                                        d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995z" />
                                </svg>
                            </div>
                            <h3 class="fw-bold mb-0 fs-5">Confirm Deletion</h3>
                        </div>
                        <p class="text-muted mb-4" id="deleteConfirmation"></p>
                        <div class="d-flex gap-2 justify-content-end" id="deleteConfirm">
                            <!-- Dynamic Content populated via script.js -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 
            Product Grid Container
            - container-fluid: full width responsive container
            - px-4 px-sm-5: responsive padding
        -->
        <section class="container-fluid my-4 px-4 px-sm-5">
            <div class="row g-4" id="productGrid">
                <!-- Cards populated via renderProducts() in script.js -->
            </div>
        </section>

    </main>


    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script src="../JavaScript/script.js"></script>
</body>



</html>
